<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="static/css/main.css">
    <title>Zodiac Online</title>
</head>
<body>
  <div id="header">
        <div id="inner-header">
          <h1>Zodiac Online</h1>
        </div>
      <hr />
  </div>
  <div id="main">
    <h5>{{ date }}</h5>
    <form>
        <select name="sign" required="required">
            <option value="">Choose your date of birth</option>
            <option value="aries">March 21 - April 19</option>
            <option value="taurus">April 20 - May 20</option>
            <option value="gemini">May 21 - June 20</option>
            <option value="cancer">June 21 - July 22</option>
            <option value="leo">July 23 - August 22</option>
            <option value="virgo">August 23 - September 22</option>
            <option value="libra">September 23 - October 22</option>
            <option value="scorpio">October 23 - November 21</option>
            <option value="sagittarius">November 22 - December 21</option>
            <option value="capricorn">December 22 - January 19</option>
            <option value="aquarius">Jan 20 - Feb 18</option>
            <option value="pisces">Feb 19 - March 20</option>
        </select>
        <input type="submit" value="Submit">
    </form>
    <h2>{{ sign }}</h2>
    <p>{{ info.date_range }}</p>
    <p>Lucky color: {{ info.color }}</p>
    <p>Lucky number: {{ info.number }}</p>
    <p>Lucky time: {{ info.time }}</p>
    <p>Best compatibility with - {{ info.compatibility }}</p>
    <h4>Your horoscope for today</h4>
    <p>{{ astro }}</p>
  </div>
</body>
</html>
